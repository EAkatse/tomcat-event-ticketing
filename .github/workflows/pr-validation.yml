name: PR Validation

on:
  pull_request:
    branches: [ main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install flake8 pylint pytest pytest-cov

      - name: Lint with flake8
        run: |
          flake8 src/ --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests/ --count --max-complexity=10 --max-line-length=127 --statistics

      - name: Lint with pylint
        run: |
          pylint src/ --fail-under=7.0 || true
          pylint tests/ --fail-under=7.0 || true

      - name: Validate SAM template
        run: |
          sam validate --template-file template.yaml

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=term-missing --cov-fail-under=70

      - name: Upload test coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

      - name: Check for secrets in code
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}